<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundSnap — Muziekherkenning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
      --accent: #6c63ff; --accent2: #ff6b9d;
      --text: #f0f0f8; --text-muted: #7a7a99;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    button { cursor: pointer; border: none; outline: none; font-family: inherit; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .app { min-height: 100vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    .orb1 { position: fixed; top: -200px; left: -100px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .orb2 { position: fixed; bottom: -200px; right: -100px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(255,107,157,0.1) 0%, transparent 70%); pointer-events: none; z-index: 0; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; position: relative; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 36px; height: 36px; background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.3); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn { position: relative; background: rgba(255,255,255,0.04); border: 1px solid #2a2a3e; color: #7a7a99; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .icon-btn:hover { border-color: var(--accent); color: #a8a3ff; background: rgba(108,99,255,0.08); }
    .badge { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; font-size: 10px; font-weight: 600; min-width: 16px; height: 16px; border-radius: 100px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 1.5px solid var(--bg); }

    .progress-track { height: 2px; width: 100%; background: #1c1c28; position: relative; z-index: 10; flex-shrink: 0; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #6c63ff, #ff6b9d); transition: width 0.1s linear; border-radius: 0 2px 2px 0; }

    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; gap: 2.5rem; position: relative; z-index: 10; }
    .hero { text-align: center; }
    .title { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 800; color: var(--text); letter-spacing: -0.03em; line-height: 1.05; margin-bottom: 0.75rem; }
    .subtitle { font-size: 0.95rem; color: #7a7a99; line-height: 1.6; }

    .visualizer { display: flex; align-items: center; justify-content: center; gap: 3px; height: 80px; width: 100%; }
    .bar { width: 4px; border-radius: 2px; background: linear-gradient(to top, #6c63ff, #ff6b9d); min-height: 4px; transition: height 0.08s ease; }
    .bar.idle { background: #2a2a3e; height: 4px !important; animation: idle-pulse 2s ease-in-out infinite; }
    .bar.idle:nth-child(even) { animation-delay: 0.5s; }
    .bar.analyzing { background: linear-gradient(to top, #4ade80, #22d3ee); animation: analyzing 0.4s ease-in-out infinite alternate; }
    @keyframes idle-pulse { 0%,100% { height: 4px !important; } 50% { height: 8px !important; } }
    @keyframes analyzing { from { height: 10px; } to { height: 60px; } }

    .button-area { display: flex; align-items: center; justify-content: center; }
    .record-btn { position: relative; width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #ff6b9d); color: white; display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease; z-index: 1; }
    .record-btn:hover { transform: scale(1.06); }
    .record-btn:active { transform: scale(0.97); }
    .record-pulse { position: absolute; inset: -8px; border-radius: 50%; background: rgba(108,99,255,0.25); animation: pulse 2s ease-in-out infinite; }
    .record-pulse2 { position: absolute; inset: -18px; border-radius: 50%; background: rgba(108,99,255,0.1); animation: pulse 2s ease-in-out infinite; animation-delay: 0.5s; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.4; } }

    .stop-btn { width: 80px; height: 80px; border-radius: 50%; background: #ff6b9d; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; animation: stop-pulse 0.6s ease-in-out infinite alternate; }
    .stop-icon { width: 28px; height: 28px; background: white; border-radius: 4px; }
    @keyframes stop-pulse { from { box-shadow: 0 0 0 0 rgba(255,107,157,0.5); } to { box-shadow: 0 0 0 16px rgba(255,107,157,0); } }

    .spinner { position: relative; display: flex; align-items: center; justify-content: center; }
    .spinner-ring { width: 72px; height: 72px; border-radius: 50%; border: 3px solid #2a2a3e; border-top-color: #6c63ff; border-right-color: #ff6b9d; animation: spin 0.8s linear infinite; }
    .spinner-note { position: absolute; font-size: 1.4rem; color: #6c63ff; animation: note-bounce 0.8s ease-in-out infinite alternate; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes note-bounce { from { transform: scale(0.9); opacity: 0.6; } to { transform: scale(1.1); opacity: 1; } }

    .hint { font-size: 0.8rem; color: #3a3a55; letter-spacing: 0.05em; text-transform: uppercase; }

    /* Result */
    .result { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; width: 100%; animation: slideUp 0.5s ease; }
    .artwork-wrap { position: relative; }
    .artwork { width: 200px; height: 200px; border-radius: 16px; object-fit: cover; box-shadow: 0 20px 60px rgba(108,99,255,0.4); }
    .artwork-placeholder { width: 200px; height: 200px; border-radius: 16px; background: linear-gradient(135deg, #1c1c28, #2a2a3e); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
    .result-info { text-align: center; }
    .tag { display: inline-block; background: rgba(108,99,255,0.15); color: #a8a3ff; border: 1px solid rgba(108,99,255,0.3); padding: 4px 14px; border-radius: 100px; font-size: 12px; font-weight: 500; letter-spacing: 0.05em; margin-bottom: 0.75rem; text-transform: uppercase; }
    .song-title { font-family: 'Syne', sans-serif; font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 800; color: var(--text); line-height: 1.1; margin-bottom: 0.4rem; }
    .song-artist { font-size: 1.1rem; font-weight: 400; color: #a8a3ff; margin-bottom: 0.4rem; }
    .song-album { font-size: 0.9rem; color: #7a7a99; }
    .song-meta { font-size: 0.85rem; color: #5a5a79; margin-top: 0.5rem; }
    .preview-box { width: 100%; max-width: 340px; background: #13131a; border-radius: 12px; padding: 1rem; border: 1px solid #2a2a3e; }
    .preview-label { font-size: 12px; color: #7a7a99; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    audio { width: 100%; height: 36px; border-radius: 6px; }
    .links { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .link-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 100px; font-size: 0.9rem; font-weight: 500; font-family: 'Inter', sans-serif; transition: transform 0.15s, opacity 0.15s; text-decoration: none !important; }
    .link-btn:hover { transform: scale(1.04); opacity: 0.9; text-decoration: none !important; }
    .spotify { background: #1db954; color: white; }
    .apple { background: #fa243c; color: white; }
    .retry-btn { background: transparent; border: 1px solid #2a2a3e; color: #7a7a99; padding: 10px 24px; border-radius: 100px; font-size: 0.9rem; transition: all 0.15s; }
    .retry-btn:hover { border-color: var(--accent); color: #a8a3ff; }

    .not-found { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; animation: slideUp 0.5s ease; }
    .not-found-icon { width: 80px; height: 80px; border-radius: 50%; background: #1c1c28; border: 2px solid #2a2a3e; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #7a7a99; }
    .not-found h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; }
    .not-found p { color: #7a7a99; font-size: 0.95rem; max-width: 280px; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Error */
    .error-banner { display: flex; align-items: center; gap: 10px; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; padding: 12px 16px; border-radius: 12px; font-size: 0.875rem; max-width: 400px; width: 100%; }
    .error-banner button { background: none; color: #fca5a5; margin-left: auto; padding: 2px 6px; border-radius: 4px; opacity: 0.7; }
    .error-banner button:hover { opacity: 1; }

    footer { text-align: center; padding: 1.25rem; position: relative; z-index: 10; }
    footer p { font-size: 0.75rem; color: #3a3a55; }

    /* Modal overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; backdrop-filter: blur(4px); }
    .modal { background: #13131a; border: 1px solid #2a2a3e; border-radius: 20px; width: 100%; max-width: 440px; overflow: hidden; animation: pop-in 0.2s ease; }
    @keyframes pop-in { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid #2a2a3e; }
    .modal-header h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }
    .close-btn { background: none; color: #7a7a99; font-size: 1rem; padding: 4px; border-radius: 4px; transition: color 0.15s; }
    .close-btn:hover { color: var(--text); }
    .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .modal-label { font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .modal-hint { font-size: 0.875rem; color: #7a7a99; line-height: 1.5; }
    .modal-hint a { color: #a8a3ff; }
    .modal-input { background: #0a0a0f; border: 1px solid #2a2a3e; border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 0.9rem; font-family: 'Inter', sans-serif; width: 100%; transition: border-color 0.15s; }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .modal-input::placeholder { color: #3a3a55; }
    .modal-tip { font-size: 0.8rem; color: #5a5a79; line-height: 1.5; }
    .modal-tip code { background: #1c1c28; padding: 1px 6px; border-radius: 4px; font-family: monospace; color: #a8a3ff; }
    .modal-footer { display: flex; gap: 0.75rem; padding: 1.25rem 1.5rem; border-top: 1px solid #2a2a3e; justify-content: flex-end; }
    .cancel-btn { background: transparent; border: 1px solid #2a2a3e; color: #7a7a99; padding: 10px 20px; border-radius: 100px; font-size: 0.875rem; transition: all 0.15s; }
    .cancel-btn:hover { border-color: var(--accent); color: #a8a3ff; }
    .save-btn { background: var(--accent); color: white; padding: 10px 24px; border-radius: 100px; font-size: 0.875rem; font-weight: 500; transition: all 0.15s; }
    .save-btn:hover { background: #7c73ff; transform: scale(1.02); }

    /* History panel */
    .history-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
    .history-panel { background: #13131a; border: 1px solid #2a2a3e; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column; animation: slideUp 0.25s ease; overflow: hidden; }
    .history-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid #2a2a3e; flex-shrink: 0; }
    .history-header h2 { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }
    .history-header-right { display: flex; align-items: center; gap: 0.75rem; }
    .clear-btn { background: none; color: #f87171; font-size: 0.8rem; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(248,113,113,0.3); transition: all 0.15s; }
    .clear-btn:hover { background: rgba(248,113,113,0.1); }
    .history-list { overflow-y: auto; flex: 1; padding: 0.5rem 0; }
    .history-empty { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; padding: 3rem 1.5rem; color: #5a5a79; }
    .history-empty span { font-size: 2.5rem; opacity: 0.4; }
    .history-item { display: flex; align-items: center; gap: 12px; width: 100%; padding: 0.75rem 1.5rem; background: none; border: none; text-align: left; transition: background 0.1s; cursor: pointer; }
    .history-item:hover { background: rgba(108,99,255,0.06); }
    .history-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
    .history-thumb-placeholder { width: 48px; height: 48px; border-radius: 8px; background: #1c1c28; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #3a3a55; flex-shrink: 0; }
    .history-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .history-title { font-size: 0.9rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-artist { font-size: 0.8rem; color: #7a7a99; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-time { font-size: 0.75rem; color: #3a3a55; flex-shrink: 0; }

    #app { min-height: 100vh; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── useAudioRecorder ──────────────────────────────────────────
function useAudioRecorder() {
  const [isRecording, setIsRecording] = useState(false);
  const [audioBlob, setAudioBlob] = useState(null);
  const [error, setError] = useState(null);
  const [audioLevel, setAudioLevel] = useState(0);
  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);
  const animFrameRef = useRef(null);

  const startRecording = useCallback(async (durationMs = 8000) => {
    setError(null); setAudioBlob(null); chunksRef.current = [];
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(stream);
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      const tick = () => {
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b) => a+b, 0) / dataArray.length;
        setAudioLevel(avg);
        animFrameRef.current = requestAnimationFrame(tick);
      };
      tick();
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
      const mr = new MediaRecorder(stream, { mimeType });
      mediaRecorderRef.current = mr;
      mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: mimeType });
        setAudioBlob(blob); setIsRecording(false); setAudioLevel(0);
        cancelAnimationFrame(animFrameRef.current);
        stream.getTracks().forEach(t => t.stop());
        audioCtx.close();
      };
      mr.start(100); setIsRecording(true);
      setTimeout(() => { if (mr.state === 'recording') mr.stop(); }, durationMs);
    } catch(err) {
      setError(err.name === 'NotAllowedError'
        ? 'Microfoon toegang geweigerd. Sta microfoon toe in je browser.'
        : `Fout bij opname: ${err.message}`);
    }
  }, []);

  const stopRecording = useCallback(() => {
    if (mediaRecorderRef.current?.state === 'recording') mediaRecorderRef.current.stop();
  }, []);

  return { isRecording, audioBlob, error, audioLevel, startRecording, stopRecording };
}

// ── useHistory ────────────────────────────────────────────────
function useHistory(authToken) {
  const loadLocal = () => { try { return JSON.parse(localStorage.getItem('soundsnap_history') || '[]'); } catch { return []; } };
  const [history, setHistory] = useState([]);

  useEffect(() => {
    if (authToken) {
      fetch('http://localhost:3001/api/history', {
        headers: { 'Authorization': `Bearer ${authToken}` }
      })
      .then(res => res.ok ? res.json() : [])
      .then(data => setHistory(data))
      .catch(err => console.error('History ophalen mislukt:', err));
    } else {
      setHistory(loadLocal());
    }
  }, [authToken]);

  const addEntry = useCallback(async (song) => {
    if (authToken) {
      try {
        const res = await fetch('http://localhost:3001/api/history', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify({ song })
        });
        if (res.ok) {
          const saved = await res.json();
          setHistory(prev => [saved, ...prev].slice(0, 20));
        }
      } catch (err) { console.error('Fout bij opslaan geschiedenis:', err); }
    } else {
      setHistory(prev => {
        const entry = { ...song, recognizedAt: new Date().toISOString(), id: Date.now() };
        const updated = [entry, ...prev].slice(0, 20);
        localStorage.setItem('soundsnap_history', JSON.stringify(updated));
        return updated;
      });
    }
  }, [authToken]);

  const clearHistory = useCallback(async () => {
    if (authToken) {
      try {
        await fetch('http://localhost:3001/api/history', {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        setHistory([]);
      } catch (err) { console.error('Fout bij wissen geschiedenis:', err); }
    } else {
      localStorage.removeItem('soundsnap_history');
      setHistory([]);
    }
  }, [authToken]);

  return { history, addEntry, clearHistory };
}

// ── recognizeSong ─────────────────────────────────────────────
async function recognizeSong(audioBlob, apiToken) {
  const form = new FormData()
  form.append('api_token', apiToken || '')
  form.append('file', audioBlob, 'recording.webm')

  const resp = await fetch('http://localhost:3001/api/recognize', { method: 'POST', body: form })
  if (!resp.ok) {
    const text = await resp.text().catch(() => '')
    throw new Error(`Proxy error: ${resp.status} ${resp.statusText} ${text}`)
  }

  const json = await resp.json()
  console.debug('AudD response', json)

  // Als de AudD API een foutmelding teruggeeft, gooi dan direct een Error
  if (json && json.status === 'error') {
    const errMsg = (json.error && (json.error.error_message || json.error.message || json.error.error)) || JSON.stringify(json.error);
    throw new Error(`AudD API Fout: ${errMsg}`);
  }

  // Return both parsed primary result and raw JSON so callers can debug
  const parsed = (function parse(json) {
    if (!json || json.status !== 'success' || !json.result) return null
    const r = json.result;
    return {
      title: r.title || 'Onbekend nummer',
      artist: r.artist || 'Onbekende artiest',
      album: r.album || null,
      releaseDate: r.release_date || null,
      timecode: r.timecode || null,
      label: r.label || null,
      spotifyUrl: r.spotify && r.spotify.external_urls && r.spotify.external_urls.spotify || null,
      spotifyPreview: null,
      appleUrl: r.apple_music && r.apple_music.url || null,
      artwork: (r.apple_music && r.apple_music.artwork && r.apple_music.artwork.url) ? r.apple_music.artwork.url.replace('{w}', '400').replace('{h}', '400') : (r.spotify && r.spotify.album && r.spotify.album.images && r.spotify.album.images[0] && r.spotify.album.images[0].url) || null,
    }
  })(json)

  return { parsed, raw: json }
}

// ── WaveVisualizer ────────────────────────────────────────────
function WaveVisualizer({ audioLevel, isRecording, state }) {
  const bars = 32;
  return (
    <div className="visualizer">
      {Array.from({ length: bars }).map((_, i) => {
        const offset = Math.abs(i - bars / 2) / (bars / 2);
        const h = isRecording
          ? Math.max(4, audioLevel * (1 - offset * 0.6) * (0.6 + Math.random() * 0.4))
          : 4;
        return (
          <div key={i} className={`bar ${state !== 'recording' ? state : ''}`}
            style={{ height: `${Math.min(h, 80)}px`, animationDelay: `${i * 30}ms` }} />
        );
      })}
    </div>
  );
}

// ── timeAgo helper ────────────────────────────────────────────
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'zonet';
  if (mins < 60) return `${mins}m geleden`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}u geleden`;
  return `${Math.floor(hrs / 24)}d geleden`;
}

// ── HistoryPanel ──────────────────────────────────────────────
function HistoryPanel({ history, onSelect, onClear, onClose }) {
  return (
    <div className="history-overlay" onClick={onClose}>
      <div className="history-panel" onClick={e => e.stopPropagation()}>
        <div className="history-header">
          <h2>Geschiedenis</h2>
          <div className="history-header-right">

// ── useAuth ───────────────────────────────────────────────────
function useAuth() {
  const [token, setToken] = useState(() => localStorage.getItem('soundsnap_token') || null);
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('soundsnap_user')); } catch { return null; }
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const authenticate = async (endpoint, email, password) => {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(`http://localhost:3001/api/auth/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Authenticatie mislukt');
      
      setToken(data.token);
      setUser(data.user);
      localStorage.setItem('soundsnap_token', data.token);
      localStorage.setItem('soundsnap_user', JSON.stringify(data.user));
      return data;
    } catch (err) {
      setError(err.message);
      throw err;
    } finally {
      setLoading(false);
    }
  };

  const login = (email, password) => authenticate('login', email, password);
  const register = (email, password) => authenticate('register', email, password);
  const logout = () => {
    setToken(null);
    setUser(null);
    localStorage.removeItem('soundsnap_token');
    localStorage.removeItem('soundsnap_user');
  };

  return { token, user, loading, error, login, register, logout, isAuthenticated: !!token };
}

  const { isRecording, audioBlob, error: recError, audioLevel, startRecording, stopRecording } = useAudioRecorder();
  const { history, addEntry, clearHistory } = useHistory(token);

  useEffect(() => {
    if (isRecording) {
      setCountdown(RECORD_DURATION / 1000); setProgress(0);
      const start = Date.now();
      const iv = setInterval(() => {
        const elapsed = Date.now() - start;
        setProgress(Math.min((elapsed / RECORD_DURATION) * 100, 100));
        setCountdown(Math.max(0, Math.ceil((RECORD_DURATION - elapsed) / 1000)));
        if (elapsed >= RECORD_DURATION) clearInterval(iv);
      }, 100);
      return () => clearInterval(iv);
    } else { setProgress(0); }
  }, [isRecording]);

  useEffect(() => {
    if (audioBlob && appState === 'recording') {
      setAppState('analyzing');
      recognizeSong(audioBlob, apiToken)
        .then(({ parsed, raw }) => {
          setRawResponse(raw || null);
          setResult(parsed);
          if (parsed) addEntry(parsed);
          setAppState('result');

        .catch(err => { setApiError(err.message); setAppState('result'); });

  }, [audioBlob]);

  const handleRecord = () => {
    if (appState !== 'idle') return;
    setApiError(null); setResult(null); setAppState('recording');
    startRecording(RECORD_DURATION);
  };
  const handleStop = () => stopRecording();

                  <div style={{marginTop:12}}>
                    <h4 style={{marginBottom:6}}>Result</h4>
                    <div style={{padding:'8px', border:'1px solid #222', borderRadius:8, marginBottom:8}}>
                      <div style={{fontWeight:700}}>{rawResponse.result.title || '—'}</div>
                      <div style={{color:'#9aa0c7'}}>{rawResponse.result.artist || 'Unknown artist'}</div>
                      <div style={{color:'#7a7a99', fontSize:12}}>{rawResponse.result.album ? `Album: ${rawResponse.result.album}` : ''} {rawResponse.result.release_date ? ` • Released: ${rawResponse.result.release_date}` : ''}</div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </main>

      <footer><p>SoundSnap · React · AudD.io API · Proftaak Web3</p></footer>

      {showSettings && <Settings token={apiToken} onSave={handleSaveToken} onClose={() => setShowSettings(false)} />}
      {showHistory && <HistoryPanel history={history} onSelect={handleSelectHistory} onClear={clearHistory} onClose={() => setShowHistory(false)} />}
      {showAuthPanel && <AuthPanel user={user} onLogin={login} onRegister={register} onLogout={logout} loading={authLoading} error={authError} history={history} onClearHistory={clearHistory} onClose={() => setShowAuthPanel(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
